<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Móveis Cândido</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #465EFF; --blue-dark: #2F47E0;
      --yellow: #FCFC30; --yellow-dark: #D4D400;
      --bg: #F7F7F5; --surface: #FFFFFF; --border: rgba(0,0,0,0.1);
      --text: #1A1A1A; --text2: #555; --text3: #999;
      --radius: 10px; --radius-lg: 14px;
    }
    body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; background: var(--bg); }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 360px; }
    .login-logo { background: var(--blue); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 1.5rem; display: flex; justify-content: center; }
    .login-logo img { height: 44px; display: block; }
    .login-title { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    .fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .fg label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .fg input { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
    .fg input:focus { border-color: var(--blue); }
    .btn-primary { width: 100%; background: var(--blue); color: #fff; border: none; padding: 10px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; font-family: inherit; }
    .btn-primary:hover { background: var(--blue-dark); }
    .login-error { font-size: 12px; color: #A32D2D; margin-top: 8px; min-height: 16px; }

    /* LAYOUT */
    .app { display: none; flex-direction: column; min-height: 100vh; }
    .app.visible { display: flex; }
    .topbar { background: var(--blue); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-logo img { height: 32px; display: block; }
    .tab-bar { display: flex; gap: 2px; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 3px; }
    .tab { font-size: 13px; padding: 5px 14px; border-radius: 6px; border: none; background: transparent; color: rgba(255,255,255,0.8); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .tab.active { background: var(--yellow); color: #1A1A1A; font-weight: 500; }
    .tab:not(.active):hover { background: rgba(255,255,255,0.1); color: #fff; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .user-badge { font-size: 12px; color: #fff; background: rgba(255,255,255,0.18); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); }
    .user-badge.gerente { background: var(--yellow); color: #1A1A1A; border-color: var(--yellow-dark); }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.35); padding: 6px 12px; border-radius: var(--radius); font-size: 13px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }
    .btn-yellow { background: var(--yellow); color: #1A1A1A; border: none; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
    .btn-yellow:hover { background: var(--yellow-dark); }

    .main { flex: 1; padding: 1.5rem; max-width: 900px; margin: 0 auto; width: 100%; }

    /* METRICS */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* SEARCH */
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-row input { flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; }
    .search-row input:focus { border-color: var(--blue); }
    .filter-sel { font-size: 13px; padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-family: inherit; }

    /* CARDS */
    .client-list { display: flex; flex-direction: column; gap: 8px; }
    .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
    .client-card:hover { border-color: rgba(0,0,0,0.2); }
    .card-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
    .cname { font-size: 14px; font-weight: 500; }
    .cmeta { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .card-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
    .b-aberto { background: #E8EBFF; color: #2F47E0; }
    .b-negociando { background: #FAEEDA; color: #633806; }
    .b-fechado { background: #EAF3DE; color: #27500A; }
    .b-perdido { background: #FCEBEB; color: #791F1F; }
    .b-retorno { background: #FFFBCC; color: #7A7A00; }
    .chevron { font-size: 16px; color: var(--text3); transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }
    .card-body { border-top: 1px solid var(--border); padding: 14px 16px; display: none; }
    .card-body.open { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 14px; }
    .dl { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .dv { font-size: 13px; color: var(--text2); }
    .section-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; margin-bottom: 12px; }
    .tl-item { display: flex; gap: 10px; }
    .tl-line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .tl-dot.reg { background: var(--blue); }
    .tl-dot.edit { background: #EF9F27; }
    .tl-dot.note { background: var(--yellow-dark); }
    .tl-stem { width: 1px; background: var(--border); flex: 1; margin: 3px 0; min-height: 8px; }
    .tl-content { padding-bottom: 12px; flex: 1; }
    .tl-date { font-size: 11px; color: var(--text3); }
    .tl-text { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .add-note-row { display: flex; gap: 8px; margin-top: 4px; }
    .add-note-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
    .add-note-row input:focus { border-color: var(--blue); }
    .card-actions { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 10px; flex-wrap: wrap; }
    .act-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: inherit; }
    .act-btn:hover { background: var(--bg); }
    .act-btn.danger:hover { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
    .modal-hd { font-size: 15px; font-weight: 500; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 18px; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal .fg { margin-bottom: 10px; }
    .modal .fg input, .modal .fg select, .modal .fg textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); width: 100%; outline: none; }
    .modal .fg input:focus, .modal .fg select:focus, .modal .fg textarea:focus { border-color: var(--blue); }
    .modal .fg textarea { min-height: 60px; resize: vertical; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .btn-modal-primary { background: var(--blue); color: #fff; border: none; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
    .btn-modal-primary:hover { background: var(--blue-dark); }
    .btn-modal-ghost { background: transparent; border: 1px solid var(--border); padding: 7px 14px; border-radius: var(--radius); font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit; }
    .btn-modal-ghost:hover { background: var(--bg); }

    /* FUNIL */
    .funil { display: flex; flex-direction: column; gap: 10px; margin-top: 1rem; }
    .funil-row { display: flex; align-items: center; gap: 12px; }
    .funil-lbl { font-size: 13px; color: var(--text2); width: 130px; flex-shrink: 0; text-align: right; }
    .funil-bg { flex: 1; background: rgba(0,0,0,0.05); border-radius: 20px; height: 26px; overflow: hidden; }
    .funil-bar { height: 100%; border-radius: 20px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 500; min-width: 4px; }
    .funil-n { font-size: 12px; color: var(--text3); width: 24px; flex-shrink: 0; }

    /* TOAST */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
    .toast { background: #1A1A1A; color: #fff; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; opacity: 0; transform: translateY(6px); transition: all 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.blue { background: var(--blue); }

    /* LOADING */
    .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
    .loading-screen.hidden { display: none; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* NOTIFICAÇÕES */
    .notif-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-start; justify-content: center; z-index: 200; padding: 20px 1rem; }
    .notif-overlay.hidden { display: none; }
    .notif-panel { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--border); width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
    .notif-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
    .notif-header-left { display: flex; align-items: center; gap: 10px; }
    .notif-title { font-size: 15px; font-weight: 500; }
    .notif-count { background: #465EFF; color: #fff; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
    .notif-close { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 18px; }
    .notif-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .notif-item { border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
    .notif-item.urgente { border-color: #F09595; background: #FFF8F8; }
    .notif-item.pendente { border-color: #FCFC30; background: #FFFFE8; }
    .notif-item.ok { border-color: #C0DD97; background: #F6FCF0; }
    .notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .notif-icon.urgente { background: #FCEBEB; color: #A32D2D; }
    .notif-icon.pendente { background: #FFFBCC; color: #8A8000; }
    .notif-icon.ok { background: #EAF3DE; color: #27500A; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .notif-desc { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
    .notif-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .notif-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .notif-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: inherit; }
    .notif-btn:hover { background: var(--bg); }
    .notif-btn.primary { background: #465EFF; color: #fff; border-color: #465EFF; }
    .notif-btn.primary:hover { background: #2F47E0; }
    .notif-empty { text-align: center; padding: 2rem 1rem; color: var(--text3); font-size: 14px; }
    .notif-bell { position: relative; }
    .notif-badge { position: absolute; top: -4px; right: -4px; background: #E24B4A; color: #fff; font-size: 10px; font-weight: 500; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .notif-section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 4px 2px; }
    /* Campo data entrega no modal */
    .entrega-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .filial-btn { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius); background:#fff; font-size:14px; font-family:inherit; color:var(--text); cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.15s; text-align:left; }
    .filial-btn:hover { border-color:#465EFF; background:#F0F2FF; color:#465EFF; }
    .filial-btn i { font-size:18px; }
    .hidden { display: none !important; }
    @media (max-width: 520px) {
      .topbar { padding: 0 1rem; flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; }
      .main { padding: 1rem; }
      .detail-grid { grid-template-columns: 1fr; }
      .form-2col { grid-template-columns: 1fr; }
    }
  </style>
</head>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:13px;color:#999">Carregando...</span>
</div>

<script>
const USERS = {
  'caio.candido':    { senha: 'candido150', role: 'gerente',  nome: 'Caio',    filial: null },
  'deize.candido':   { senha: 'deize123',   role: 'vendedor', nome: 'Deize',   filial: 'Montanha/ES' },
  'tamires.candido': { senha: 'tamires123', role: 'vendedor', nome: 'Tamires', filial: 'Itabaiana/ES' },
  'davi.candido':    { senha: 'davi123',    role: 'vendedor', nome: 'Davi',    filial: 'Ponto Belo/ES' },
};
const FILIAIS = ['Ponto Belo/ES', 'Montanha/ES', 'Itabaiana/ES'];

const SK = 'crm_loja_prod_v1';
let sessionFilial = null; // filial ativa na sessão (gerente pode mudar)
let clients = [];
let editId = null;
let currentUser = null;

const AV_COLORS = [
  {bg:'#E8EBFF',color:'#2F47E0'},{bg:'#E6F1FB',color:'#185FA5'},
  {bg:'#EEEDFE',color:'#3C3489'},{bg:'#FAEEDA',color:'#854F0B'},
  {bg:'#FBEAF0',color:'#993556'},{bg:'#EAF3DE',color:'#3B6D11'},
];

function initials(n) {
  if (!n) return '?';
  const p = n.trim().split(' ');
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}
function avatarFor(n) {
  let h = 0; for (let c of (n||''
)) h = (h*31+c.charCodeAt(0)) % AV_COLORS.length;
  return AV_COLORS[h];
}
function tsNow() {
  return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function dateNow() { return new Date().toLocaleDateString('pt-BR'); }
function stLabel(s) { return {aberto:'Em aberto',negociando:'Negociando',fechado:'Fechado',perdido:'Perdido',retorno:'Retorno agendado'}[s]||s; }
function motLabel(m) { return {preco:'Preço',concorrente:'Concorrente',prazo:'Prazo',credito:'Crédito negado',desistiu:'Desistiu',outro:'Outro'}[m]||'';}
function brl(v) { if (!v) return '—'; return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function isGerente() { return USERS[currentUser]?.role === 'gerente'; }

function periodoFilter(clientes) {
  const p = document.getElementById('filter-periodo')?.value || '';
  if (!p) return clientes;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  return clientes.filter(cl => {
    if (!cl.dataCad) return false;
    // dataCad está em dd/mm/yyyy
    const parts = cl.dataCad.split('/');
    if (parts.length < 3) return false;
    const d = new Date(parts[2], parts[1]-1, parts[0]);
    d.setHours(0,0,0,0);
    if (p === 'hoje') return d.getTime() === hoje.getTime();
    if (p === 'semana') {
      const dow = hoje.getDay(); // 0=dom
      const seg = new Date(hoje); seg.setDate(hoje.getDate() - (dow === 0 ? 6 : dow - 1));
      const dom = new Date(seg); dom.setDate(seg.getDate() + 6);
      return d >= seg && d <= dom;
    }
    if (p === 'mes') return d.getMonth() === hoje.getMonth() && d.getFullYear() === hoje.getFullYear();
    if (p === 'mes_ant') {
      const ant = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 1);
      return d.getMonth() === ant.getMonth() && d.getFullYear() === ant.getFullYear();
    }
    return true;
  });
}
function filialUser() { return isGerente() ? sessionFilial : (USERS[currentUser]?.filial || null); }

function doLogin() {
  const u = document.getElementById('l-user').value.trim().toLowerCase();
  const p = document.getElementById('l-pass').value;
  if (USERS[u] && USERS[u].senha === p) {
    currentUser = u;
    localStorage.setItem('crm_user', u);
    if (USERS[u].role === 'gerente') {
      // Mostra step de seleção de filial
      document.getElementById('login-step1').style.display = 'none';
      document.getElementById('login-nome').textContent = USERS[u].nome;
      document.getElementById('login-step2').style.display = 'block';
    } else {
      sessionFilial = USERS[u].filial;
      showApp();
    }
  } else {
    document.getElementById('login-error').textContent = 'Usuário ou senha incorretos.';
  }
}
function selecionarFilial(filial) {
  sessionFilial = filial;
  localStorage.setItem('crm_session_filial', filial || '__todas__');
  showApp();
}
function voltarLogin() {
  currentUser = null;
  document.getElementById('login-step2').style.display = 'none';
  document.getElementById('login-step1').style.display = 'block';
  document.getElementById('l-pass').value = '';
}
function doLogout() {
  localStorage.removeItem('crm_user');
  localStorage.removeItem('crm_session_filial');
  currentUser = null; sessionFilial = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-wrap').classList.remove('hidden');
  document.getElementById('login-step1').style.display = 'block';
  document.getElementById('login-step2').style.display = 'none';
  document.getElementById('login-error').textContent = '';
}
function saveLocal() { localStorage.setItem(SK, JSON.stringify(clients)); }
function loadLocal() {
  try { const d = localStorage.getItem(SK); if (d) clients = JSON.parse(d); } catch(e) { clients=[]; }
}
function init() {
  const saved = localStorage.getItem('crm_user');
  const savedFilial = localStorage.getItem('crm_session_filial');
  if (saved && USERS[saved]) {
    currentUser = saved;
    if (USERS[saved].role === 'gerente' && savedFilial) {
      sessionFilial = savedFilial === '__todas__' ? null : savedFilial;
      showApp();
    } else if (USERS[saved].role === 'gerente') {
      // Gerente sem filial salva — pede pra escolher
      document.getElementById('loading-screen').classList.add('hidden');

function saveClient() {

  const novoStatus = document.getElementById('f-status').value;
  const obs = document.getElementById('f-obs').value.trim();

  const filial = document.getElementById('f-filial').value || filialUser() || '';
  const dataentrega = document.getElementById('f-dataentrega').value;
  if (editId !== null) {
    const idx = clients.findIndex(c => c.id===editId);
    const c = clients[idx];
    if (!c.timeline) c.timeline = [];
    const changes = [];
    if (c.status !== novoStatus) {
      changes.push(`Status: ${stLabel(c.status)} → ${stLabel(novoStatus)}`);
      if (novoStatus === 'fechado' && !c.datafech) {
        clients[idx] = clients[idx] || c;
        c.datafech = new Date().toISOString().split('T')[0];
      }
    }
    const np = document.getElementById('f-produto').value.trim();

    const nv = document.getElementById('f-valor').value;
    if (nv && nv !== String(c.valor)) changes.push(`Valor: ${brl(nv)}`);
    if (obs) changes.push(obs);
    if (changes.length) c.timeline.push({ type:'edit', date: tsNow(), user: nomeU, text: changes.join(' | ') });
    clients[idx] = { ...c, nome, contato: document.getElementById('f-contato').value.trim(),
      vendedor: document.getElementById('f-vendedor').value.trim(),
      produto: document.getElementById('f-produto').value.trim(),
      valor: document.getElementById('f-valor').value,

  saveLocal(); closeModal(); render(); updateNotifBadge();

function diffDays(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const hoje = new Date(); hoje.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.floor((hoje - d) / 86400000);
}

function calcNotifs() {
  const role = USERS[currentUser]?.role;
  const nomeU = USERS[currentUser]?.nome || currentUser;
  const items = [];

  clients.filter(c => c.status === 'fechado').forEach(c => {
    const vendedor = c.vendedor || '';
    // Só mostra pro vendedor dono ou pro gerente
    const myFil = filialUser();
    const isOwn = vendedor.toLowerCase() === nomeU.toLowerCase() || (myFil && c.filial === myFil);
    if (!isOwn && role !== 'gerente') return;

    // ── Lembrete pós-entrega (liga logo após entrega) ──────────────────────
    const diasFech = diffDays(c.datafech);
    const diasEntrega = diffDays(c.dataentrega);
    const refDias = diasEntrega !== null ? diasEntrega : diasFech;

    // Confirmação de entrega: ligar 1 dia após entrega (ou fechamento)
    const jaConfirmou = (c.timeline||[]).some(e => e.text.toLowerCase().includes('entrega confirmada') || e.text.toLowerCase().includes('confirmou entrega'));
    if (!jaConfirmou && refDias !== null) {
      if (refDias >= 1) {
        items.push({
          id: c.id,
          tipo: refDias >= 3 ? 'urgente' : 'pendente',
          icone: 'ti-phone',
          nome: c.nome,
          produto: c.produto,
          vendedor: vendedor,
          desc: refDias >= 3
            ? `Ligar há ${refDias} dias em atraso! Confirmar se a entrega ocorreu bem.`
            : `Ligar hoje para confirmar se a entrega foi realizada com sucesso.`,
          meta: `Fechado em ${c.datafech ? new Date(c.datafech+'T12:00:00').toLocaleDateString('pt-BR') : c.dataCad}${c.dataentrega ? ' · Entrega prevista: ' + new Date(c.dataentrega+'T12:00:00').toLocaleDateString('pt-BR') : ''}`,
          prioridade: 1,
          contato: c.contato || '',
          acao: 'entrega'
        });
      }
    }

    // ── Lembrete 7 dias (satisfação com produto, montagem etc) ────────────
    const ja7dias = (c.timeline||[]).some(e => e.text.toLowerCase().includes('ligação 7 dias') || e.text.toLowerCase().includes('contato 7 dias'));
    if (!ja7dias && refDias !== null && refDias >= 7) {
      items.push({
        id: c.id,
        tipo: refDias >= 10 ? 'urgente' : 'pendente',
        icone: 'ti-star',
        nome: c.nome,
        produto: c.produto,
        vendedor: vendedor,
        desc: refDias >= 10
          ? `${refDias - 7} dia(s) em atraso! Ligar para verificar satisfação com entrega e montagem.`
          : `7 dias desde a venda. Ligar para saber se ficou tudo certo com o produto e montagem.`,
        meta: `Venda concluída há ${refDias} dias`,
        prioridade: 2,
        contato: c.contato || '',
        acao: '7dias'
      });
    }
  });

  // Ordenar: urgente primeiro, depois por prioridade
  items.sort((a,b) => {
    if (a.tipo === 'urgente' && b.tipo !== 'urgente') return -1;
    if (b.tipo === 'urgente' && a.tipo !== 'urgente') return 1;
    return a.prioridade - b.prioridade;
  });

  return items;
}

  } else {
    const urgentes = items.filter(i => i.tipo === 'urgente');
    const pendentes = items.filter(i => i.tipo === 'pendente');
    let html = '';
    if (urgentes.length) {
      html += `<div class="notif-section-label">🔴 Atrasados (${urgentes.length})</div>`;
      html += urgentes.map(i => notifItemHtml(i)).join('');
    }
    if (pendentes.length) {
      html += `<div class="notif-section-label" style="margin-top:6px">🟡 Pendentes hoje (${pendentes.length})</div>`;
      html += pendentes.map(i => notifItemHtml(i)).join('');
    }
    list.innerHTML = html;
  }
  document.getElementById('notif-overlay').classList.remove('hidden');
}

function notifItemHtml(i) {
  const wppNum = i.contato.replace(/\D/g,'');
  const wppLink = wppNum.length >= 8 ? `<button class="notif-btn primary" onclick="wppNotif('${i.contato}')"><i class="ti ti-brand-whatsapp"></i> WhatsApp</button>` : '';
  return `
  <div class="notif-item ${i.tipo}">
    <div class="notif-icon ${i.tipo}"><i class="ti ${i.icone}"></i></div>
    <div class="notif-body">
      <div class="notif-name">${i.nome} ${i.vendedor ? '<span style="font-weight:400;color:#999;font-size:11px">· '+i.vendedor+'</span>' : ''}</div>
      <div class="notif-desc">${i.desc}</div>
      ${i.produto ? `<div class="notif-meta"><i class="ti ti-tag" style="font-size:11px"></i> ${i.produto}</div>` : ''}
      <div class="notif-meta">${i.meta}</div>
      <div class="notif-actions">
        ${wppLink}
        <button class="notif-btn" onclick="marcarFeito(${i.id},'${i.acao}',this)"><i class="ti ti-check"></i> Marcar como feito</button>
      </div>
    </div>
  </div>`;
}

function closeNotif() { document.getElementById('notif-overlay').classList.add('hidden'); }
function closeNotifBg(e) { if (e.target.id === 'notif-overlay') closeNotif(); }

function wppNotif(contato) {
  const n = contato.replace(/\D/g,'');
  if (n.length < 8) return;
  window.open('https://wa.me/'+(n.startsWith('55')?n:'55'+n), '_blank');
}

function marcarFeito(id, acao, btn) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  if (!c.timeline) c.timeline = [];
  const nomeU = USERS[currentUser]?.nome || currentUser;
  const texto = acao === '7dias'
    ? `Ligação 7 dias realizada por ${nomeU} — satisfação verificada`
    : `Entrega confirmada por ${nomeU} — cliente contatado`;
  c.timeline.push({ type: 'note', date: tsNow(), user: nomeU, text: texto });
  saveLocal();
  // Remover item visualmente
  btn.closest('.notif-item').style.opacity = '0.4';
  btn.closest('.notif-item').style.pointerEvents = 'none';
  btn.textContent = '✓ Registrado';
  updateNotifBadge();
  toast('Contato registrado no histórico!', 'blue');
}
// ─────────────────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
